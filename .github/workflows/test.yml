name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  firestore-rules:
    name: Firestore rules / write-path tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The Firestore emulator is a Java process.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci

      # Boots the auth + firestore emulators, runs vitest against them, tears down.
      - run: npm run test:emulators
